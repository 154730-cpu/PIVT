        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }
        .game {
            background-color: #0D7634;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }  
        .glitch {
            background-color: #76340D;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        a {
            text-decoration: none;
        }
        button {
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            button {
                background-color: #1e1e1e;
                color: #ffffff;
            }
            .glitch {
                background-color: #8a3f1f
                color: #ffffff;
            }
            .game {
                background-color: #1f8a4c

        }
